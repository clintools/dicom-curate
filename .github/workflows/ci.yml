name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.13.1"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Upgrade npm
        run: npm i -g npm@11

      - name: Debug npm
        run: |
          node -v
          npm -v
          npm config get registry
          npm config get cache

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: E2E smoke
        run: pnpm exec vitest run --config vitest.e2e.config.ts --pool=forks

      - name: Semantic Release Dry Run
        run: npx semantic-release --dry-run
        env:
          # HUSKY: 0 # uncomment this to disable husky in the semantic-release step
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
